services:
  cat-doraemon-farm:
    build: .
    container_name: cat-doraemon-farm
    restart: always
    environment:
      # Set to 'all' to run all accounts, or comma separated numbers like '1,2'
      - AUTO_START=all
      - TZ=Asia/Ho_Chi_Minh
    volumes:
      - .:/app
      - /app/node_modules
      - ./data/data.json:/app/data/data.json
    command: npm run watch
